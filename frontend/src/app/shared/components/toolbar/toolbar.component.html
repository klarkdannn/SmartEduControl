<mat-toolbar color="primary" class="app-header">
  <!-- Первая строка: текстовый логотип вместо картинки -->
  <mat-toolbar-row class="logo-row mat-elevation-z8">
    <a routerLink="/" class="logo-link">
      <div class="logo-text">
        <mat-icon class="logo-icon">school</mat-icon>
        <span class="logo-title">LMS</span>
        <span class="logo-subtitle">Learning Management System</span>
      </div>
    </a>
  </mat-toolbar-row>

  <!-- Вторая строка (навигация) без изменений -->
  <mat-toolbar-row class="nav-row">
    <div class="nav-container">
      <a mat-button *ngIf="authService.validateRoles(['ROLE_STUDENT'], 'any')" routerLink="/course" class="nav-link">My Course</a>
      <a mat-button routerLink="/about" class="nav-link">About</a>
      <a mat-button routerLink="/faculties" class="nav-link">Faculties</a>
      <a *ngIf="authService.validateRoles(['ROLE_STUDENT'], 'any')" mat-button routerLink="/student-services" class="nav-link">Student services</a>
      <a *ngIf="authService.validateRoles(['ROLE_TEACHER'], 'any')" mat-button routerLink="/teacher-services" class="nav-link">Teacher services</a>
      <a *ngIf="authService.validateRoles(['ROLE_ADMIN'], 'any')" mat-button routerLink="/admin-panel" class="nav-link">Admin panel</a>
      <a *ngIf="!authService.loggedIn()" routerLink="/auth/login" mat-button class="nav-link">Login</a>
      <a *ngIf="authService.loggedIn()" (click)="authService.logout()" mat-button class="nav-link">Logout</a>
    </div>
  </mat-toolbar-row>
</mat-toolbar>
